[pytest]
markers =
    adversarial_deterministic: deterministic adversarial route evaluations with no LLM calls.
    adversarial_llm: LLM-backed adversarial evaluations that require GEMINI_API_KEY.
    adversarial_router: Stage-1 adversarial router evaluations.
    adversarial_planner: Stage-2 adversarial workflow planner evaluations.
    adversarial_e2e: mocked end-to-end adversarial evaluations.
    adversarial_safety: safety-critical adversarial evaluations.
